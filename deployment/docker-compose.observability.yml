# Observability overlay: Prometheus + Grafana scraping the engine's /metrics.
# Usage (from the deployment/ directory):
#   ENGINE_API_KEY=... docker-compose -f docker-compose.yml -f docker-compose.observability.yml up --build
# Grafana:    http://localhost:3000  (admin / admin by default)
# Prometheus: http://localhost:9090
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: morphic-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - engine
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: morphic-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
