services:
  engine:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: morphic-engine
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - ENGINE_API_KEY=${ENGINE_API_KEY:?ENGINE_API_KEY must be set}
      - ENGINE_DB_PATH=/app/state/engine_logs.db
      - ENGINE_FAISS_INDEX_PATH=/app/state/faiss_index.bin
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - engine_persistence:/app/state  # Persist DB, FAISS index, reports, etc.
    restart: unless-stopped
    command: ["uvicorn", "fastapi_server:app", "--host", "0.0.0.0", "--port", "8000"]
    # To use the full version with sentence-transformers + faiss-cpu pre-installed:
    # docker-compose -f deployment/docker-compose.full.yml up --build

  neo4j:
    image: neo4j:5-community
    container_name: morphic-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  engine_persistence:
